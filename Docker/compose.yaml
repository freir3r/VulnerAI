version: "3.9"
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend # Create a Dockerfile specifically for the frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend # Create a Dockerfile specifically for the backend
    ports:
      - "5000:5000"
    environment:
      # Add any environment variables your backend needs here
      # Example:
      # DATABASE_URL: "postgres://user:password@db:5432/database"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
