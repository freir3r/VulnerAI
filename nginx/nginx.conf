events { worker_connections 1024; }

http {
    upstream api_cluster {
        server api:3000;
    }

    server {
        listen 80;

        # --- 1. Recursos (Pasta Resources) ---
        # Acede a ficheiros de assets (imagens, css, etc) se o URL começar por /resources/
        location /resources/ {
            rewrite ^/resources/(.*) /$1 break;
            proxy_pass http://assets;
        }

        # --- 2. API (Backend) - CORREÇÃO AQUI ---
        # Só envia para a API se a palavra terminar ali, tiver uma barra ou um ponto de interrogação.
        # Assim, '/scans' vai para a API, mas '/scans.html' vai para o Site.
        location ~ ^/(scan|scans|targets|health|presets)($|/|\?) {
            proxy_pass http://api_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Websockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- 3. Imagens e CSS do Site Principal ---
        # Força imagens e CSS a irem para o Website (Resolve o problema das imagens não carregarem)
        location ~ \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://website;
            proxy_set_header Host $host;
        }

        # --- 4. Site Principal (Padrão) ---
        # Tudo o resto (incluindo .html) vai para o Website
        location / {
            proxy_pass http://website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}