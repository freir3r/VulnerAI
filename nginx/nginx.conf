events { worker_connections 1024; }

http {
    upstream api_cluster {
        server api:3000;
    }

    server {
        listen 80;

        # --- 1. Correção "Magica" para os Recursos ---
        # O teu HTML usa "../Resources/...", o browser pede "/Resources/..."
        # O ( ~* ) torna a regra "case-insensitive" (funciona com Resources ou resources)
        location ~* ^/resources/ {
            # Remove a parte /Resources/ e manda o resto para o contentor assets
            rewrite ^/resources/(.*) /$1 break;
            rewrite ^/Resources/(.*) /$1 break;
            proxy_pass http://assets;
        }

        # --- 2. Correção para Imagens "Soltas" ---
        # O teu HTML tem 'src="VulnerAI Logo.png"'. Isto pede a imagem na raiz.
        # Se ela estiver na pasta Resources, esta regra vai lá buscá-la automaticamente.
        location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
            # Tenta servir pelo website, se falhar (404), o Nginx não consegue fazer "try_files" com proxy_pass facilmente.
            # TRUQUE: Vamos assumir que TODAS as imagens estão nos assets para simplificar,
            # ou enviamos para o website e esperamos que estejam lá.
            
            # Se as imagens estão misturadas, a melhor aposta sem mudar código é:
            # Enviar pedidos de imagem para o contentor de assets se não tiverem caminho
            try_files $uri @assets_fallback;
        }
        
        # Fallback para imagens
        location @assets_fallback {
            proxy_pass http://assets;
        }

        # --- 3. API (Backend) ---
        location ~ ^/(scan|scans|targets|health|presets)($|/|\?) {
            proxy_pass http://api_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- 4. Site Principal (Padrão) ---
        location / {
            proxy_pass http://website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}