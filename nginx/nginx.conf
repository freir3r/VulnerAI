events { worker_connections 1024; }

http {
    upstream api_cluster {
        server api:3000;
    }

    server {
        listen 80;

        # --- Rota 1: Recursos (Pasta Resources) ---
        location /resources/ {
            rewrite ^/resources/(.*) /$1 break;
            proxy_pass http://assets/;
        }

        # --- Rota 2: API (Backend) - CORRIGIDA ---
        # A MUDANÇA ESTÁ AQUI EM BAIXO: ($|/|\?)
        # Adicionámos a barra invertida '\' antes do '?' para o Nginx não reclamar.
        location ~ ^/(scan|scans|targets|health|presets)($|/|\?) {
            # Nota: Em regex locations, evite a barra no fim do proxy_pass
            proxy_pass http://api_cluster; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # CORREÇÃO: Adicionei o '#' nesta linha, senão o Nginx crasha
            # Configuração necessária para Websockets (Socket.io)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- Rota 3: Ficheiros Estáticos (Imagens/CSS/JS) ---
        location ~ \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://website;
            proxy_set_header Host $host;
        }

        # --- Rota 4: Site Principal (Frontend) ---
        location / {
            proxy_pass http://website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}