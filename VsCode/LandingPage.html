<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VulnerAI</title>
  <link rel="stylesheet" href="LandingPage.css" />
</head>
<body>
  <!-- HERO SECTION -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-illustration">
      <img src="../Resources/LandingPage/LandingPageImg1.png" alt="Landing Image">
    </div>

    <div class="hero-text">
      <div class="logo">
        <img src="../Resources/LandingPage/LogoIcon.png" alt="Logo">
        <h1>VulnerAI</h1>
      </div>
      <p>Identify and prioritize vulnerabilities effectively!</p>
      <div class="buttons">
        <button class="btn-primary">Get Started</button>
        <button class="btn-secondary">Login</button>
      </div>
    </div>
  </div>
</section>


<!-- WORKFLOW SECTION -->
<section class="workflow">
  <div class="workflow-container">
    <!-- Linha vertical central -->
    <div class="workflow-line"></div>

    <!-- Step 1 - Ícone à esquerda -->
    <div class="workflow-step left">
      <div class="step-icon">
        <img src="../Resources/LandingPage/istockphoto-696912200-612x612 1.png" alt="Scan">
      </div>
      <div class="connector-line"></div>
      <div class="step-content">
        <p>Scan authorized networks</p>
      </div>
    </div>

    <!-- Step 2 - Ícone à direita -->
    <div class="workflow-step right">
      <div class="step-content">
        <p>Find Common Vulnerabilities and exploits</p>
      </div>
      <div class="connector-line"></div>
      <div class="step-icon">
        <img src="../Resources/LandingPage/istockphoto-1409661663-612x612 1.png" alt="Vulnerabilities">
      </div>
    </div>

    <!-- Step 3 - Ícone à esquerda -->
    <div class="workflow-step left">
      <div class="step-icon">
        <img src="../Resources/LandingPage/istockphoto-1207692239-612x612 1.png" alt="AI Fix">
      </div>
      <div class="connector-line"></div>
      <div class="step-content">
        <p>Fix Them Manually or with our AI playbook</p>
      </div>
    </div>

    <!-- Step 4 - Ícone à direita -->
    <div class="workflow-step right">
      <div class="step-content">
        <p>Get Detailed Reports of our scans and fix suggestions</p>
      </div>
      <div class="connector-line"></div>
      <div class="step-icon">
        <img src="../Resources/LandingPage/report-data-folder-icon-outline-business-document-vector 1.png" alt="Reports">
      </div>
    </div>
  </div>
</section>
