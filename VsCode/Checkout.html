<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VulnerAI — Checkout</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="checkout.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="back-plain" aria-label="Back" id="btn-back">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M15 19L8 12L15 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="brand">
      <img class="brand-logo" src="VulnerAI Logo.png" alt="VulnerAI" />
    </div>
  </header>

  <main class="wrap">
    <section class="checkout">
      <!-- SUMMARY -->
      <aside class="summary">
        <h2>Order Summary</h2>
        <div class="sum-row"><span class="label">Plan</span><span id="sum-plan" class="value">Premium — Monthly</span></div>
        <div class="sum-row"><span class="label">Price</span><span id="sum-price" class="value">€9.99 / mo</span></div>
        <div class="sum-row small" id="sum-billed">Billed monthly</div>
        <hr />
       <div class="sum-row total">
  <span class="label">Total today</span>
  <span id="sum-total" class="value">€9.99</span>
</div>

      </aside>

      <!-- MAIN PANEL -->
      <section class="panel">
        <h1 class="title">Checkout</h1>
        <p class="muted">Review your details before proceeding to payment.</p>

        <!-- Monthly / Yearly -->
        <div class="billing-switch">
          <button id="btn-monthly" class="seg active">Monthly</button>
          <button id="btn-yearly" class="seg">Yearly <span class="save">save 20%</span></button>
        </div>

        <!-- Billing details -->
        <form id="bill-form" class="bill-form" novalidate>
          <div class="row">
            <div class="col">
              <label class="lbl">Full name</label>
              <input id="name" class="in" placeholder="John Appleseed" required />
            </div>
            <div class="col">
              <label class="lbl">Email</label>
              <input id="email" type="email" class="in" placeholder="you@email.com" required />
            </div>
          </div>

          <div class="row">
            <div class="col">
              <label class="lbl">Country</label>
              <select id="country" class="in">
                <option>Portugal</option><option>Spain</option><option>France</option>
                <option>Germany</option><option>United States</option>
              </select>
            </div>
            <div class="col">
              <label class="lbl">VAT number (optional)</label>
              <input id="vat" class="in" placeholder="PT123456789" />
            </div>
          </div>

          <!-- Terms -->
          <label class="chk">
            <input id="agree" type="checkbox">
            <span>I agree to the <a href="#" data-doc="terms">Terms</a> and <a href="#" data-doc="privacy">Privacy Policy</a>.</span>
          </label>

          <!-- Actions -->
          <div class="actions">
            <button id="btn-pay" type="submit" class="btn primary">Pay now</button>
            <button id="btn-cancel" type="button" class="btn ghost">Cancel</button>
          </div>
        </form>

        <p class="secure">🔒 Payments are processed securely.</p>
      </section>
    </section>
  </main>

  <!-- LEGAL MODAL -->
  <div id="legal-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog">
      <div class="modal-head">
        <h3 id="legal-title">Document</h3>
        <button class="modal-close" data-close>×</button>
      </div>
      <div class="modal-body" id="legal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast">Payment submitted (demo)</div>

  <script src="Checkout.js"></script>

  <script>
  (function () {
    try {
      const quick = localStorage.getItem('vulnerai.theme');
      const prefs = JSON.parse(localStorage.getItem('vulnerai.prefs')||'{}');
      const isDark = quick ? (quick === 'dark') : !!prefs.themeDarkHeader;
      document.body.classList.toggle('dark', isDark);
      window.addEventListener('storage', e=>{
        if(e.key==='vulnerai.theme' || e.key==='vulnerai.prefs'){
          const q = localStorage.getItem('vulnerai.theme');
          const p = JSON.parse(localStorage.getItem('vulnerai.prefs')||'{}');
          document.body.classList.toggle('dark', q ? (q==='dark') : !!p.themeDarkHeader);
        }
      });
    } catch(_) {}
  })();
  </script>

<link rel="stylesheet" href="checkout.css" />
</head>
<body>

  <script>
  (function(){
    const modal = document.getElementById('legal-modal');
    const title = document.getElementById('legal-title');
    const body  = document.getElementById('legal-body');

    // Textos dos documentos
    const docs = {
      terms: `
        <h4>Terms of Service</h4>
        <p>Welcome to <strong>VulnerAI</strong>. By accessing or using our platform, you agree to be bound by the following Terms of Service. Please read them carefully before proceeding with any payment or subscription.</p>

        <h5>1. Use of Service</h5>
        <p>VulnerAI provides cybersecurity scanning and reporting tools for authorized network assessments. You agree to use these tools only on systems and domains that you own or have explicit permission to test. Any misuse or unauthorized access is strictly prohibited and may lead to suspension or legal action.</p>

        <h5>2. Accounts and Subscriptions</h5>
        <p>To access premium features, you may need to create an account and provide valid billing information. Subscriptions renew automatically based on your chosen plan (monthly or yearly), unless cancelled before the renewal date.</p>

        <h5>3. Payments and Refunds</h5>
        <p>All payments are processed securely through our payment partners. Charges are non-refundable once the scanning or reporting service has been delivered. If you experience any billing errors, please contact support within 7 days.</p>

        <h5>4. Data Privacy and Security</h5>
        <p>We handle user data in accordance with our <a href="#" data-doc="privacy">Privacy Policy</a>. Sensitive payment data (such as card details) is never stored on our servers.</p>

        <h5>5. Limitations of Liability</h5>
        <p>While we strive to provide accurate and up-to-date results, VulnerAI is not responsible for any damages, downtime, or data loss resulting from scans or user misuse. Our service is provided "as is" without warranties of any kind.</p>

        <h5>6. Termination</h5>
        <p>We may suspend or terminate access if suspicious or malicious activity is detected, or if these Terms are violated. You may cancel your subscription at any time through your account settings.</p>

        <h5>7. Contact</h5>
        <p>If you have questions about these Terms, please contact our support team at <a href="mailto:support@vulnerai.com">support@vulnerai.com</a>.</p>

        <p style="margin-top:14px; font-size:.9rem; color:#999;">Last updated: October 2025</p>
      `,

      privacy: `
        <h4>Privacy Policy</h4>
        <p>We respect your privacy and are committed to protecting your personal data. This policy explains how we collect, use, and safeguard your information when using <strong>VulnerAI</strong>.</p>

        <h5>1. Information We Collect</h5>
        <p>We collect only essential data for account creation, billing, and scan reporting. Payment details are processed securely via certified third-party providers and never stored by us.</p>

        <h5>2. Data Usage</h5>
        <p>Your information is used solely to deliver the requested services and improve product experience. We do not sell or share data with external parties without your consent.</p>

        <h5>3. Cookies</h5>
        <p>Cookies are used to maintain session state and personalize the dashboard experience. You may disable cookies in your browser settings, but some features may stop working properly.</p>

        <h5>4. Data Protection</h5>
        <p>All data transmissions are encrypted using TLS. Access to stored information is restricted and monitored under internal security policies.</p>

        <h5>5. User Rights</h5>
        <p>You have the right to request, correct, or delete your data at any time by contacting our support team.</p>

        <h5>6. Contact</h5>
        <p>For privacy inquiries, email <a href="mailto:privacy@vulnerai.com">privacy@vulnerai.com</a>.</p>

        <p style="margin-top:14px; font-size:.9rem; color:#999;">Last updated: October 2025</p>
      `
    };

    function openModal(docKey){
      const html = docs[docKey];
      if(!html) return;
      title.textContent = docKey === 'terms' ? 'Terms of Service' : 'Privacy Policy';
      body.innerHTML = html;
      modal.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
      modal.querySelector('.modal-dialog').focus();
    }

    function closeModal(){
      modal.setAttribute('aria-hidden','true');
      document.body.style.overflow='';
    }

    document.addEventListener('click', e=>{
      const link = e.target.closest('[data-doc]');
      if(link){
        e.preventDefault();
        openModal(link.dataset.doc);
      }
      if(e.target.matches('[data-close], .modal-backdrop')){
        closeModal();
      }
    });

    document.addEventListener('keydown', e=>{
      if(e.key==='Escape' && modal.getAttribute('aria-hidden')==='false'){
        closeModal();
      }
    });
  })();
  </script>

  <script>
  (function(){
    // Elementos
    const btnMonthly = document.getElementById('btn-monthly');
    const btnYearly  = document.getElementById('btn-yearly');
    const sumPlan     = document.getElementById('sum-plan');
    const sumPrice    = document.getElementById('sum-price');
    const sumBilled   = document.getElementById('sum-billed');
    const form        = document.getElementById('bill-form');
    const inputEmail  = document.getElementById('email');
    const payButton   = document.getElementById('btn-pay');

    // Valores exibidos (ajusta se mudares preços)
    const UI = {
      monthly: { plan: 'Premium — Monthly', priceText: '€9.99 / mo', billedText: 'Billed monthly' },
      yearly:  { plan: 'Premium — Yearly',  priceText: '€95.88 / yr', billedText: 'Billed yearly (save 20%)' }
    };

    // estado
    let billing = 'monthly'; // default

    function setBilling(mode){
      billing = mode === 'yearly' ? 'yearly' : 'monthly';

      // UI buttons
      btnMonthly.classList.toggle('active', billing === 'monthly');
      btnYearly.classList.toggle('active', billing === 'yearly');

      // update summary text
      const vals = UI[billing];
      if(vals){
        sumPlan.textContent = vals.plan;
        sumPrice.textContent = vals.priceText;
        sumBilled.textContent = vals.billedText;
      }
    }

    // Eventos
    btnMonthly.addEventListener('click', () => setBilling('monthly'));
    btnYearly.addEventListener('click', () => setBilling('yearly'));

    // Form submit -> cria checkout session
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      payButton.disabled = true;
      payButton.textContent = 'Redirecting...';

      const customerEmail = (inputEmail.value || '').trim() || undefined;

      try {
        console.log('Sending checkout request', { billing, customerEmail });

        const res = await fetch('/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ billing, customerEmail })
        });

        const data = await res.json();
        if (res.ok && data.url) {
          // redireciona para o Stripe Checkout
          window.location = data.url;
        } else {
          console.error('Checkout error', data);
          alert('Erro ao criar sessão de pagamento: ' + (data.error || JSON.stringify(data)));
          payButton.disabled = false;
          payButton.textContent = 'Pay now';
        }
      } catch (err) {
        console.error('Fetch error', err);
        alert('Erro de rede ao criar sessão de pagamento.');
        payButton.disabled = false;
        payButton.textContent = 'Pay now';
      }
    });

    // Inicializa UI
    setBilling('monthly');
  })();
  </script>

</body>
</html>
